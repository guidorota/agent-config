services:
  llama-swap:
    image: ghcr.io/mostlygeek/llama-swap:unified-cuda-2026-05-23
    container_name: llama-swap
    restart: unless-stopped
    ports:
      - "8080:8080"   # LAN-exposed
    cpuset: "0,2,4,6,8,10,12,14" # Pins to all physical cores, not SMT ones
    volumes:
      - ./llama-server-config.yaml:/app/config.yaml:ro
      - hf-cache:/root/.cache/huggingface
      - ./models:/models:ro
    environment:
      - HF_HOME=/root/.cache/huggingface
    shm_size: "2g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - "--config"
      - "/app/config.yaml"
      - "--listen"
      - "0.0.0.0:8080"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./open-webui-data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URLS=http://llama-swap:8080/v1

volumes:
  hf-cache:

services:
  llama-swap:
    image: ghcr.io/mostlygeek/llama-swap:unified-cuda-2026-05-23
    container_name: llama-swap
    restart: unless-stopped
    ports:
      - "8080:8080"   # LAN-exposed
    cpuset: "0,2,4,6,8,10,12,14" # Pins to all physical cores, not SMT ones
    volumes:
      - ./llama-server-config.yaml:/app/config.yaml:ro
      - hf-cache:/root/.cache/huggingface
      - ./models:/models:ro
    environment:
      - HF_HOME=/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - "--config"
      - "/app/config.yaml"
      - "--listen"
      - "0.0.0.0:8080"

  hermes-agent:
    image: nousresearch/hermes-agent
    container_name: hermes
    restart: unless-stopped
    depends_on:
      - llama-swap
    ports:
      - "8642:8642"             # OpenAI-compatible API (LAN-exposed)
    volumes:
      - ./hermes-data:/opt/data
    environment:
      - HERMES_UID=1000
      - HERMES_GID=1000
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${HERMES_API_KEY}   # min 8 chars, set in .env
    command: ["gateway", "run"]

volumes:
  hf-cache:

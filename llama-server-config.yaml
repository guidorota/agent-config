healthCheckTimeout: 300
logLevel: debug

models:
  qwen3.5-2b-8k:
    env:
      - "CUDA_VISIBLE_DEVICES="
    cmd: |
      llama-server
      -m /models/Qwen3.5-2B-Q8_0.gguf
      --port ${PORT} --host 0.0.0.0
      --ctx-size 8192
      -ngl 0
      -ctk q4_0 -ctv q4_0
      --temp 0.3 --top-p 0.9 --top-k 40 --min-p 0.05
      -t 8
      -b 4096 -ub 2048
      --no-mmap
      --mlock
      --chat-template-kwargs '{"enable_thinking":false}'
      --jinja
    ttl: 1800
      
  qwen3.6-27b-64k:
    cmd: |
      llama-server
      -m /models/Qwen3.6-27B-UD-Q5_K_XL.gguf
      --port ${PORT} --host 0.0.0.0
      -ngl 99 -fa on -np 1
      -c 65536
      -ctk q8_0 -ctv q8_0
      --temp 1.0 --top-p 0.95 --top-k 20 --min-p 0.0
      --jinja
    ttl: 1800

  qwen3.6-27b-96k:
    cmd: |
      llama-server
      -m /models/Qwen3.6-27B-UD-Q4_K_XL.gguf
      --port ${PORT} --host 0.0.0.0
      -ngl 99 -fa on -np 1
      -c 98304
      -ctk q8_0 -ctv q8_0
      --temp 1.0 --top-p 0.95 --top-k 20 --min-p 0.0
      --jinja
    ttl: 1800
  
  qwen3.5-122b-96k:
    cmd: |
      llama-server
      -m /models/Qwen3.5-122B-A10B-UD-Q5_K_XL-00001-of-00003.gguf
      --port ${PORT} --host 0.0.0.0
      -ngl 99 --n-cpu-moe 40 -fa on -np 1
      -c 98304
      -ctk q8_0 -ctv q8_0
      --temp 1.0 --top-p 0.95 --top-k 20 --min-p 0.0
      -t 8
      -b 4096 -ub 2048
      --no-mmap
      --mlock
      --jinja
    ttl: 1800

matrix:
  vars:
    q2b8k: qwen3.5-2b-8k
    q27b64k: qwen3.6-27b-64k
    q27b96k: qwen3.6-27b-96k
    q122b96k: qwen3.5-122b-96k

  sets:
    standard: "(q27b64k | q27b96k | q122b96k) & q2b8k"

hooks:
  on_startup:
    preload:
      - "qwen3.5-2b-8k"
      - "qwen3.6-27b-64k"
